services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: real-independent-db
    environment:
      POSTGRES_DB: real_independent_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - real-independent-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: real-independent-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - real-independent-network

  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real-independent-app
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: real_independent_central
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      WUZAPI_API_KEY: ${WUZAPI_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - ./storage:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - real-independent-network
    command: php artisan serve --host=0.0.0.0 --port=8001

  # Mailpit for local email testing
  mailpit:
    image: axllent/mailpit
    container_name: real-independent-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - real-independent-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: real-independent-nginx
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - mailpit
    networks:
      - real-independent-network

  # MinIO for object storage
  minio:
    image: minio/minio
    container_name: real-independent-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - real-independent-network
    command: server /data --console-address ":9001"

  # MinIO Client to create bucket
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - real-independent-network
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin123; do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb local/real-independent;
      /usr/bin/mc anonymous set public local/real-independent;
      exit 0;
      "

  wuzapi:
    image: asternic/wuzapi:latest
    container_name: real-independent-wuzapi
    environment:
      WUZAPI_ADMIN_TOKEN: admin123456
      API_KEY: admin123456
      WUZAPI_HTTP_PORT: 8080
      TZ: America/Sao_Paulo
    ports:
      - "8081:8080"
      - "8082:3000"
    volumes:
      - wuzapi_data:/app/data
      - wuzapi_sessions:/app/sessions
    depends_on:
      - postgres
    networks:
      - real-independent-network

volumes:
  postgres_data:
  redis_data:
  wuzapi_data:
  wuzapi_sessions:
  minio_data:

networks:
  real-independent-network:
    driver: bridge
