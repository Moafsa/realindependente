<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Nexts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Header -->
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold text-gray-900 mb-4">API Test Center</h1>
                <p class="text-xl text-gray-600">Teste todas as funcionalidades da API do Nexts</p>
            </div>

            <!-- Authentication Section -->
            <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">🔐 Autenticação</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="loginEmail" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="admin@Nexts.com" value="admin@Nexts.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                        <input type="password" id="loginPassword" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="password" value="password">
                    </div>
                </div>
                <div class="mt-6">
                    <button onclick="login()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                        Fazer Login
                    </button>
                    <button onclick="logout()" class="bg-gray-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-700 transition-colors ml-4">
                        Logout
                    </button>
                </div>
                <div id="authStatus" class="mt-4 p-4 rounded-lg hidden"></div>
            </div>

            <!-- API Test Sections -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Athletes API -->
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">🏃 Atletas API</h2>
                    <div class="space-y-4">
                        <button onclick="testAPI('GET', '/api/v1/athletes')" class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors">
                            GET /athletes (Listar)
                        </button>
                        <button onclick="createTestAthlete()" class="w-full bg-blue-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                            POST /athletes (Criar)
                        </button>
                        <button onclick="testAPI('GET', '/api/v1/athletes/1')" class="w-full bg-purple-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-purple-700 transition-colors">
                            GET /athletes/1 (Visualizar)
                        </button>
                    </div>
                </div>

                <!-- Teams API -->
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">⚽ Equipes API</h2>
                    <div class="space-y-4">
                        <button onclick="testAPI('GET', '/api/v1/teams')" class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors">
                            GET /teams (Listar)
                        </button>
                        <button onclick="createTestTeam()" class="w-full bg-blue-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                            POST /teams (Criar)
                        </button>
                        <button onclick="testAPI('GET', '/api/v1/teams/1')" class="w-full bg-purple-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-purple-700 transition-colors">
                            GET /teams/1 (Visualizar)
                        </button>
                    </div>
                </div>

                <!-- AI API -->
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">🤖 IA API</h2>
                    <div class="space-y-4">
                        <button onclick="testAPI('GET', '/api/v1/ai/stats')" class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors">
                            GET /ai/stats (Estatísticas)
                        </button>
                        <button onclick="generateWorkoutPlan()" class="w-full bg-blue-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                            POST /ai/workout (Gerar Treino)
                        </button>
                        <button onclick="generateNutritionPlan()" class="w-full bg-purple-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-purple-700 transition-colors">
                            POST /ai/nutrition (Gerar Nutrição)
                        </button>
                    </div>
                </div>

                <!-- Financial API -->
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">💰 Financeiro API</h2>
                    <div class="space-y-4">
                        <button onclick="testAPI('GET', '/api/v1/financial/transactions')" class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors">
                            GET /transactions (Listar)
                        </button>
                        <button onclick="testAPI('GET', '/api/v1/financial/summary')" class="w-full bg-blue-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                            GET /summary (Resumo)
                        </button>
                        <button onclick="createTestTransaction()" class="w-full bg-purple-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-purple-700 transition-colors">
                            POST /transactions (Criar)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Dashboard Stats -->
            <div class="bg-white rounded-lg shadow-lg p-8 mt-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">📊 Dashboard Stats</h2>
                <button onclick="getDashboardStats()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition-colors">
                    Obter Estatísticas do Dashboard
                </button>
            </div>

            <!-- Results Section -->
            <div class="bg-white rounded-lg shadow-lg p-8 mt-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">📋 Resultados dos Testes</h2>
                <div id="results" class="bg-gray-100 p-4 rounded-lg min-h-64 font-mono text-sm overflow-auto">
                    <div class="text-gray-600">Clique em qualquer botão acima para testar a API...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script>
        // Configure axios defaults
        axios.defaults.baseURL = window.location.origin;
        axios.defaults.headers.common['Accept'] = 'application/json';
        axios.defaults.headers.common['Content-Type'] = 'application/json';

        let authToken = null;

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString();
            const colors = {
                info: 'text-blue-600',
                success: 'text-green-600',
                error: 'text-red-600',
                warning: 'text-yellow-600'
            };
            
            const logEntry = document.createElement('div');
            logEntry.className = `mb-2 ${colors[type]}`;
            logEntry.innerHTML = `<span class="text-gray-500">[${timestamp}]</span> ${message}`;
            
            results.appendChild(logEntry);
            results.scrollTop = results.scrollHeight;
        }

        function updateAuthStatus(message, type = 'info') {
            const status = document.getElementById('authStatus');
            status.className = `mt-4 p-4 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            status.textContent = message;
            status.classList.remove('hidden');
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                log(`Tentando fazer login com: ${email}`, 'info');
                
                const response = await axios.post('/login', {
                    email: email,
                    password: password
                });

                // Extract token from response (assuming Laravel Sanctum)
                authToken = response.data.token || 'authenticated';
                axios.defaults.headers.common['Authorization'] = `Bearer ${authToken}`;
                
                updateAuthStatus('Login realizado com sucesso!', 'success');
                log('✅ Login realizado com sucesso!', 'success');
                
            } catch (error) {
                updateAuthStatus('Erro no login: ' + (error.response?.data?.message || error.message), 'error');
                log('❌ Erro no login: ' + (error.response?.data?.message || error.message), 'error');
            }
        }

        function logout() {
            authToken = null;
            delete axios.defaults.headers.common['Authorization'];
            updateAuthStatus('Logout realizado!', 'info');
            log('🚪 Logout realizado!', 'warning');
        }

        async function testAPI(method, endpoint, data = null) {
            if (!authToken && endpoint !== '/api/v1/athletes' && endpoint !== '/api/v1/teams') {
                log('❌ Você precisa fazer login primeiro!', 'error');
                return;
            }

            try {
                log(`${method} ${endpoint}`, 'info');
                
                let response;
                if (method === 'GET') {
                    response = await axios.get(endpoint);
                } else if (method === 'POST') {
                    response = await axios.post(endpoint, data);
                } else if (method === 'PUT') {
                    response = await axios.put(endpoint, data);
                } else if (method === 'DELETE') {
                    response = await axios.delete(endpoint);
                }

                log(`✅ Sucesso: ${JSON.stringify(response.data, null, 2)}`, 'success');
                
            } catch (error) {
                log(`❌ Erro: ${error.response?.data?.message || error.message}`, 'error');
                if (error.response?.data) {
                    log(`Detalhes: ${JSON.stringify(error.response.data, null, 2)}`, 'error');
                }
            }
        }

        function createTestAthlete() {
            const athleteData = {
                name: 'João Silva Teste',
                email: 'joao.teste@email.com',
                phone: '(11) 99999-9999',
                birth_date: '2005-01-15',
                position: 'forward',
                height: 175,
                weight: 70,
                emergency_contact_name: 'Maria Silva',
                emergency_contact_phone: '(11) 88888-8888'
            };

            testAPI('POST', '/api/v1/athletes', athleteData);
        }

        function createTestTeam() {
            const teamData = {
                name: 'Equipe Teste API',
                slug: 'equipe-teste-api',
                description: 'Equipe criada via API para testes',
                category: 'sub-17',
                level: 'intermediate',
                primary_color: '#3B82F6',
                secondary_color: '#1E40AF'
            };

            testAPI('POST', '/api/v1/teams', teamData);
        }

        function generateWorkoutPlan() {
            const workoutData = {
                goals: ['melhorar resistência', 'aumentar velocidade'],
                duration_weeks: 4,
                intensity: 'medium',
                restrictions: ['sem equipamentos especiais']
            };

            testAPI('POST', '/api/v1/ai/athletes/1/workout', workoutData);
        }

        function generateNutritionPlan() {
            const nutritionData = {
                goals: ['ganhar massa muscular', 'melhorar performance'],
                dietary_restrictions: ['sem lactose'],
                allergies: [],
                preferences: ['comida brasileira'],
                meals_per_day: 5
            };

            testAPI('POST', '/api/v1/ai/athletes/1/nutrition', nutritionData);
        }

        function createTestTransaction() {
            const transactionData = {
                type: 'payment',
                status: 'pending',
                amount: 150.00,
                description: 'Mensalidade - Janeiro 2025',
                payment_method: 'boleto'
            };

            testAPI('POST', '/api/v1/financial/transactions', transactionData);
        }

        function getDashboardStats() {
            testAPI('GET', '/api/v1/dashboard/stats');
        }

        // Auto-login for demo
        window.addEventListener('load', function() {
            log('🚀 API Test Center carregado!', 'info');
            log('💡 Dica: Use as credenciais padrão para fazer login', 'info');
        });
    </script>
</body>
</html>
